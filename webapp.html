<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EazyFlare Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--cf-blue-900:#0a1628;--cf-blue-800:#0d2137;--cf-blue-700:#003681;--cf-blue-600:#0051a3;--cf-blue-500:#1166c5;--cf-blue-100:#e0ecfc;--cf-blue-50:#f0f6ff;--cf-orange:#f6821f;--cf-orange-hover:#e5750e;--cf-orange-soft:#fff5eb;--cf-green:#2fa85d;--cf-green-soft:#eefaf3;--cf-red:#d63e3e;--cf-red-soft:#fcedee;--cf-yellow:#e4a11b;--cf-yellow-soft:#fef9ec;--g900:#1a1a1a;--g700:#404040;--g600:#555;--g500:#737373;--g400:#a0a0a0;--g300:#c5c5c5;--g200:#e5e5e5;--g100:#f3f3f3;--g50:#fafafa;--white:#fff;--r:8px;--rl:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--g100);color:var(--g900);min-height:100vh;-webkit-tap-highlight-color:transparent}
body.rtl{direction:rtl;font-family:'Vazirmatn',sans-serif}
body.rtl .ltr{direction:ltr;text-align:left}

/* Topbar */
.topbar{background:var(--cf-blue-900);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand img{height:28px}
.topbar-title{color:#fff;font-size:15px;font-weight:700}
.topbar-actions{display:flex;align-items:center;gap:8px}
.topbar-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.8);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;font-size:14px}
.topbar-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.topbar-btn svg{width:18px;height:18px}
.topbar-user{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.8);font-size:12px;padding:4px 10px 4px 4px;border-radius:20px;background:rgba(255,255,255,.08);cursor:pointer}
.topbar-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--cf-orange),#e27625);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}

/* Nav */
.nav-tabs{background:var(--white);border-bottom:1px solid var(--g200);display:flex;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--g500);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s;font-family:inherit;display:flex;align-items:center;gap:6px}
.nav-tab:hover{color:var(--g700)}.nav-tab.active{color:var(--cf-blue-600);border-bottom-color:var(--cf-blue-600);font-weight:600}
.nav-tab svg{width:16px;height:16px}
.nav-badge{font-size:10px;background:var(--cf-blue-100);color:var(--cf-blue-700);padding:1px 6px;border-radius:10px;font-weight:700}

/* Layout */
.content{max-width:960px;margin:0 auto;padding:16px;display:flex;flex-direction:column;min-height:calc(100vh - 160px)}
.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--rl);box-shadow:0 1px 2px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-title svg{width:18px;height:18px;color:var(--cf-blue-600)}
.card-body{padding:20px}.card-body.compact{padding:0}

/* Login */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,var(--cf-blue-900) 0%,var(--cf-blue-800) 40%,var(--g100) 40%)}
.login-card{background:var(--white);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.12);width:100%;max-width:400px;padding:32px 28px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{width:72px;height:72px;object-fit:contain}
.login-logo h2{font-size:20px;font-weight:800;margin-top:12px}
.login-logo p{font-size:13px;color:var(--g500);margin-top:4px}

/* Forms */
.fg{margin-bottom:16px}
.fl{display:block;font-size:13px;font-weight:600;color:var(--g700);margin-bottom:6px}
.fi{width:100%;padding:10px 14px;border:1px solid var(--g300);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--g900);background:var(--white);outline:none;transition:.15s;direction:ltr;text-align:left}
.fi:focus{border-color:var(--cf-blue-500);box-shadow:0 0 0 3px rgba(17,102,197,.15)}
.fi::placeholder{color:var(--g400)}.fi[disabled]{opacity:.5}
.fs{width:100%;padding:10px 14px;border:1px solid var(--g300);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--g900);background:var(--white);outline:none;cursor:pointer;-webkit-appearance:none}
.fs:focus{border-color:var(--cf-blue-500);box-shadow:0 0 0 3px rgba(17,102,197,.15)}
.fh{font-size:11px;color:var(--g500);margin-top:4px}
.ferr{display:none;margin-top:12px;padding:10px;border-radius:8px;background:var(--cf-red-soft);color:var(--cf-red);font-size:13px}

/* Toggle */
.ftg{display:flex;align-items:center;gap:10px;cursor:pointer}
.tg-track{width:40px;height:22px;background:var(--g300);border-radius:11px;position:relative;transition:.2s;flex-shrink:0}
.tg-track.on{background:var(--cf-orange)}
.tg-knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;right:2px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tg-track.on .tg-knob{right:20px}
body.rtl .tg-knob{right:auto;left:2px}
body.rtl .tg-track.on .tg-knob{left:20px;right:auto}
.tg-label{font-size:13px;color:var(--g700)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;border:1px solid transparent;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-pri{background:var(--cf-blue-600);color:#fff}.btn-pri:hover{background:var(--cf-blue-700)}
.btn-or{background:var(--cf-orange);color:#fff}.btn-or:hover{background:var(--cf-orange-hover)}
.btn-out{background:var(--white);color:var(--g700);border:1px solid var(--g300)}.btn-out:hover{background:var(--g50)}
.btn-dng{background:var(--cf-red);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-group{display:flex;gap:8px}

/* Table */
.dns-table{width:100%;border-collapse:collapse}
.dns-table thead th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--g500);text-transform:uppercase;background:var(--g50);border-bottom:1px solid var(--g200)}
body.rtl .dns-table thead th{text-align:right}
.dns-table tbody tr{border-bottom:1px solid var(--g100);transition:.1s}
.dns-table tbody tr:hover{background:var(--cf-blue-50)}
.dns-table tbody tr:last-child{border-bottom:none}
.dns-table tbody td{padding:12px 16px;font-size:13px;vertical-align:middle}
.tbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;font-family:'Courier New',monospace}
.tbadge.A{background:#e0ecfc;color:#003681}.tbadge.AAAA{background:#ede9fe;color:#5b21b6}.tbadge.CNAME{background:#eefaf3;color:#166534}.tbadge.MX{background:#fef9ec;color:#92400e}.tbadge.TXT{background:#fce7f3;color:#9d174d}.tbadge.NS{background:#e0f2fe;color:#075985}.tbadge.SRV{background:#fff7ed;color:#9a3412}.tbadge.CAA{background:#f3e8ff;color:#6b21a8}
.px-icon{display:inline-flex;align-items:center;gap:4px;font-size:11px}
.px-icon.on{color:var(--cf-orange)}.px-icon.off{color:var(--g400)}
.px-icon svg{width:16px;height:16px}
.n-cell,.c-cell{font-family:'SF Mono','Courier New',monospace;font-size:12px;word-break:break-all;direction:ltr;text-align:left}
.n-cell{font-weight:600;color:var(--g900)}.c-cell{color:var(--g600);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-cell{font-size:12px;color:var(--g500)}
.a-cell{display:flex;gap:4px}
.abtn{width:30px;height:30px;border-radius:6px;border:1px solid var(--g200);background:#fff;color:var(--g500);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.abtn svg{width:14px;height:14px}
.abtn:hover{background:var(--g50);color:var(--g700)}.abtn.danger:hover{background:var(--cf-red-soft);color:var(--cf-red);border-color:var(--cf-red)}

/* Status */
.st{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px}
.st.active{background:var(--cf-green-soft);color:var(--cf-green)}.st.pending{background:var(--cf-yellow-soft);color:var(--cf-yellow)}.st.inactive{background:var(--cf-red-soft);color:var(--cf-red)}
.st-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* Zone selector */
.zone-sel{background:var(--white);border-bottom:1px solid var(--g200);padding:12px 16px;display:flex;align-items:center;gap:12px}
.zone-dd{flex:1;padding:8px 12px;border:1px solid var(--g300);border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;background:var(--white);color:var(--g900);cursor:pointer;outline:none;direction:ltr}

/* Modal */
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.mo-bg.open{display:flex}
.mo-sheet{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:24px 20px;animation:shUp .3s cubic-bezier(.22,1,.36,1)}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mo-handle{width:36px;height:4px;background:var(--g300);border-radius:2px;margin:0 auto 16px}
.mo-title{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:200;transition:transform .3s cubic-bezier(.22,1,.36,1);box-shadow:0 4px 16px rgba(0,0,0,.1);font-family:inherit}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--cf-green);color:#fff}.toast.err{background:var(--cf-red);color:#fff}.toast.nfo{background:var(--cf-blue-600);color:#fff}

/* Loading */
.lbar{height:3px;background:var(--g200);position:relative;overflow:hidden}
.lbar::after{content:'';position:absolute;top:0;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--cf-orange),transparent);animation:lslide 1.2s infinite}
@keyframes lslide{0%{left:-40%}100%{left:100%}}
.skeleton{background:linear-gradient(90deg,var(--g100) 25%,var(--g200) 50%,var(--g100) 75%);background-size:200% 100%;animation:shim 1.5s infinite;border-radius:4px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Empty / Filter */
.empty{text-align:center;padding:40px 20px}
.empty svg{width:56px;height:56px;color:var(--g300);margin-bottom:16px}
.empty h3{font-size:16px;font-weight:700;color:var(--g700);margin-bottom:4px}
.empty p{font-size:13px;color:var(--g500);margin-bottom:16px}
.f-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.f-pill{padding:4px 12px;border-radius:16px;border:1px solid var(--g300);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;color:var(--g600)}
.f-pill:hover{border-color:var(--cf-blue-500);color:var(--cf-blue-600)}
.f-pill.active{background:var(--cf-blue-600);color:#fff;border-color:var(--cf-blue-600)}
.irow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--g100);font-size:13px}
.irow:last-child{border-bottom:none}
.ilbl{color:var(--g500);font-weight:500}
.ival{color:var(--g900);font-weight:600;direction:ltr}

/* Footer */
.footer{text-align:center;padding:20px 16px 24px;font-size:12px;color:var(--g400);margin-top:auto}
.footer a{color:var(--cf-orange);text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}

/* Responsive */
@media(max-width:600px){
  .dns-table thead{display:none}
  .dns-table tbody tr{display:flex;flex-wrap:wrap;padding:12px 16px;gap:6px;align-items:center}
  .dns-table tbody td{padding:0;border:none}
  .c-cell{max-width:none;white-space:normal}
}
.view{display:none;animation:vIn .25s ease}.view.active{display:block}
@keyframes vIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mt-16{margin-top:16px}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="EazyFlare">
      <h2>EazyFlare</h2>
      <p id="loginSubtitle">Cloudflare DNS Dashboard</p>
    </div>
    <div style="text-align:center;margin-bottom:16px">
      <button class="btn btn-sm btn-out" onclick="setLang('en')" id="langEn" style="font-weight:700">EN</button>
      <button class="btn btn-sm btn-out" onclick="setLang('fa')" id="langFa">فا</button>
    </div>
    <div class="fg">
      <label class="fl" id="lAuthLabel">Authentication Method</label>
      <select class="fs" id="authMethod" onchange="onAuthChange()">
        <option value="token" id="optToken">API Token (recommended)</option>
        <option value="apikey" id="optApikey">Global API Key + Email</option>
      </select>
    </div>
    <div class="fg" id="emailGrp" style="display:none">
      <label class="fl" id="lEmailLabel">Email</label>
      <input class="fi" id="loginEmail" type="email" placeholder="you@example.com"/>
    </div>
    <div class="fg">
      <label class="fl" id="keyLbl">API Token</label>
      <input class="fi" id="loginKey" type="password" id="loginKeyPlaceholder"/>
      <div class="fh" id="keyHint">From My Profile → API Tokens</div>
    </div>
    <button class="btn btn-or btn-block" id="loginBtn" onclick="doLogin()" style="margin-top:8px" data-en="Sign In" data-fa="ورود به حساب">Sign In</button>
    <div class="ferr" id="loginErr"></div>
    <div class="footer" style="margin-top:24px" id="loginFooter">Made with ♡ by <a href="https://t.me/SchmitzWS" target="_blank">Schmitz</a></div>
  </div>
</div>

<div id="mainApp" style="display:none">
  <div class="topbar">
    <div class="topbar-brand"><img src="logo.png" alt="" style="height:28px"><div class="topbar-title">EazyFlare</div></div>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="setLang(L==='en'?'fa':'en')" id="langToggle" title="Language">فا</button>
      <button class="topbar-btn" onclick="refreshView()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg></button>
      <div class="topbar-user" onclick="doLogout()"><div class="topbar-avatar">CF</div><span id="logoutTxt">Logout</span></div>
    </div>
  </div>
  <div class="zone-sel" id="zoneSel" style="display:none">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--g500)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <select class="zone-dd" id="zoneDd" onchange="onZoneChange()"></select>
  </div>
  <div class="nav-tabs" id="navTabs" style="display:none">
    <button class="nav-tab active" data-tab="overview" onclick="switchTab('overview')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span id="tabOverview">Overview</span></button>
    <button class="nav-tab" data-tab="dns" onclick="switchTab('dns')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="6" rx="1"/><rect x="2" y="15" width="20" height="6" rx="1"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg><span>DNS</span><span class="nav-badge" id="dnsCount">0</span></button>
    <button class="nav-tab" data-tab="ssl" onclick="switchTab('ssl')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="11" width="10" height="8" rx="1"/><path d="M12 15v2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><span id="tabSsl">SSL/TLS</span></button>
    <button class="nav-tab" data-tab="settings" onclick="switchTab('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span id="tabSettings">Settings</span></button>
    <button class="nav-tab" data-tab="pagerules" onclick="switchTab('pagerules')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg><span id="tabPagerules">Page Rules</span></button>
    <button class="nav-tab" data-tab="workers" onclick="switchTab('workers')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span id="tabWorkers">Workers</span></button>
    <button class="nav-tab" data-tab="email" onclick="switchTab('email')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg><span id="tabEmail">Email</span></button>
    <button class="nav-tab" data-tab="deploy" onclick="switchTab('deploy')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="M8 17l4-4 4 4"/></svg><span id="tabDeploy">Deploy</span></button>
  </div>
  <div class="lbar" id="lbar" style="display:none"></div>

var S={token:'',email:'',auth:'token',zones:[],zone:null,dns:[],tab:'overview',filter:''};
var $=function(id){return document.getElementById(id)};

function hdrs(){
  var h={"Content-Type":"application/json"};
  if(S.auth==='token')h["X-CF-Token"]=S.token;
  else{h["X-CF-Email"]=S.email;h["X-CF-Key"]=S.token}
  return h;
}
function cf(path,opt){
  opt=opt||{};var url=PROXY+path;var h=hdrs();
  if(opt.headers){for(var k in opt.headers)h[k]=opt.headers[k]}
  opt.headers=h;
  return fetch(url,opt).then(function(r){return r.json()}).then(function(d){
    if(!d.success)throw new Error((d.errors||[]).map(function(e){return e.message}).join(', ')||'Unknown');return d});
}
function showL(){$('lbar').style.display='block'}
function hideL(){$('lbar').style.display='none'}

function openMo(h){$('moBody').innerHTML=h;$('moBg').classList.add('open')}
function closeMo(){$('moBg').classList.remove('open')}

function onAuthChange(){
  var m=$('authMethod').value;
  $('emailGrp').style.display=m==='apikey'?'block':'none';
  if(m==='token'){$('keyLbl').textContent=t('tokenLabel');$('loginKey').placeholder=t('tokenPh')}
  else{$('keyLbl').textContent=t('keyLabel');$('loginKey').placeholder=t('keyPh')}
  if($('lEmailLabel'))$('lEmailLabel').textContent=t('emailLabel');
}
function doLogin(){
  var method=$('authMethod').value,key=$('loginKey').value.trim(),email=$('loginEmail').value.trim();
  if(!key){showErr(t('errToken'));return}
  if(method==='apikey'&&!email){showErr(t('errEmail'));return}
  S.auth=method;S.token=key;S.email=email;
  $('loginBtn').disabled=true;$('loginBtn').textContent=t('checking');$('loginErr').style.display='none';
  var path=method==='token'?'/user/tokens/verify':'/zones?per_page=1';
  cf(path).then(function(){localStorage.setItem('cf_auth',JSON.stringify({auth:S.auth,token:S.token,email:S.email}));enterApp()})
  .catch(function(e){showErr(t('error')+': '+e.message)})
  .finally(function(){$('loginBtn').disabled=false;$('loginBtn').textContent=t('signIn')});
}
function showErr(m){var e=$('loginErr');e.textContent=m;e.style.display='block'}
function doLogout(){S.token='';S.email='';S.zones=[];S.zone=null;S.dns=[];localStorage.removeItem('cf_auth');$('mainApp').style.display='none';$('loginScreen').style.display='flex';$('loginKey').value='';$('loginEmail').value='';toast(t('disconnected'),'nfo')}
function enterApp(){$('loginScreen').style.display='none';$('mainApp').style.display='block';loadApp()}

function loadApp(){showL();var all=[],p=1;function lp(){cf('/zones?per_page=50&page='+p).then(function(d){all=all.concat(d.result);var tp=(d.result_info&&d.result_info.total_pages)||1;if(p<tp){p++;lp()}else{S.zones=all;renderZoneDd();if(all.length>0){var params=new URLSearchParams(location.search);var pre=params.get('zone');var idx=-1;if(pre)for(var i=0;i<all.length;i++){if(all[i].id===pre){idx=i;break}}if(idx<0)idx=0;$('zoneDd').selectedIndex=idx;selectZone(all[idx])}$('zoneSel').style.display='flex';$('navTabs').style.display='flex';hideL()}}).catch(function(e){toast(t('error')+': '+e.message,'err');hideL()})}lp()}

}

function loadSSL(){
  if(!S.zone)return;
  $('sslArea').innerHTML='<div class="skeleton" style="height:120px"></div>';
  showL();
  cf('/zones/'+S.zone.id+'/settings/ssl').then(function(d){
    var cur=d.result.value;
    var modes=[
      {id:'off',label:t('sslOff'),desc:t('sslOffDesc'),icon:'🔴'},
      {id:'flexible',label:t('sslFlexible'),desc:t('sslFlexibleDesc'),icon:'🟡'},
      {id:'full',label:t('sslFull'),desc:t('sslFullDesc'),icon:'🟢'},
      {id:'strict',label:t('sslStrict'),desc:t('sslStrictDesc'),icon:'🔵'}
    ];
    var h='<div style="padding:4px 0"><div class="irow"><span class="ilbl">'+t('sslCurrent')+'</span><span class="ival" style="font-weight:600">'+cur+'</span></div></div>';
    h+='<div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">';

    } else {
      h+='<div style="display:flex;flex-direction:column;gap:8px">';

        var st=r.status==='active';
        var targets=r.targets.map(function(t){return t.constraint.value}).join(', ');
        var actions=r.actions.map(function(a){return a.id+(a.value?': '+JSON.stringify(a.value).substring(0,30):'')}).join(', ');
        h+='<div style="border:1px solid var(--g200);border-radius:8px;padding:12px">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center">';

        h+='<div style="display:flex;gap:4px">';

        h+='<button class="btn btn-sm btn-out" onclick="deletePageRule(\''+r.id+'\')">🗑</button>';
        h+='</div></div>';
        h+='<div style="font-size:12px;color:var(--g500);margin-top:4px">→ '+actions+'</div>';
        h+='</div>';
      });
      h+='</div>';

    $('pagerulesArea').innerHTML=h;
    hideL();
  }).catch(function(e){$('pagerulesArea').innerHTML='<div style="padding:16px;color:var(--g500)">'+t('error')+': '+e.message+'</div>';hideL()});
}
function openAddPageRule(){
  var dom=S.zone?S.zone.name:'example.com';
  var h='<div style="font-weight:600;margin-bottom:12px;font-size:16px">➕ Add Page Rule</div>';
  h+='<div style="margin-bottom:12px"><label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">URL Pattern</label><input id="prUrl" class="fi" placeholder="'+dom+'/*" style="font-size:15px;padding:12px 14px"></div>';
  h+='<div style="margin-bottom:12px"><label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Action</label><select id="prAction" class="fs" style="font-size:15px;padding:12px 14px" onchange="onPrAction()"><option value="always_use_https">Always Use HTTPS</option><option value="forwarding_url_301">301 Redirect</option><option value="forwarding_url_302">302 Redirect</option><option value="cache_level_bypass">Cache: Bypass</option><option value="cache_level_aggressive">Cache: Aggressive</option><option value="ssl_flexible">SSL: Flexible</option><option value="ssl_full">SSL: Full</option><option value="ssl_strict">SSL: Strict</option></select></div>';
  h+='<div id="prValWrap" style="margin-bottom:12px;display:none"><label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Value</label><input id="prVal" class="fi" placeholder="https://example.com/$1" style="font-size:15px;padding:12px 14px"></div>';
  h+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="btn btn-out" onclick="closeMo()">'+t('cancel')+'</button><button class="btn btn-pri" onclick="submitPageRule()">'+t('save')+'</button></div>';
  openMo(h);
  onPrAction();
}
function onPrAction(){
  var v=$('prAction').value;
  var show=v.startsWith('forwarding_url');
  $('prValWrap').style.display=show?'block':'none';
}
function submitPageRule(){
  if(!S.zone)return;
  var url=$('prUrl').value.trim();
  if(!url){toast(t('error'),'err');return}
  var raw=$('prAction').value;
  var action;
  if(raw==='forwarding_url_301'||raw==='forwarding_url_302'){
    var code=raw.endsWith('301')?301:302;
    var dest=$('prVal').value.trim();
    if(!dest){toast(t('error'),'err');return}
    action={id:'forwarding_url',value:{url:dest,status_code:code}};
  } else {
    var parts=raw.split('_');
    if(parts.length>=2&&(parts[0]==='cache'||parts[0]==='ssl')){
      action={id:parts[0]+'_level',value:parts.slice(1).join('_')};
      if(parts[0]==='ssl')action.id='ssl';
    } else {
      action={id:raw};
    }
  }
  var body={targets:[{target:'url',constraint:{operator:'matches',value:url}}],actions:[action],status:'active'};
  showL();closeMo();
  fetch(PROXY+'/zones/'+S.zone.id+'/pagerules',{method:'POST',headers:hdrs(),body:JSON.stringify(body)})
  .then(function(r){return r.json()}).then(function(d){if(d.success){toast(t('created'),'ok');loadPageRules()}else{toast(t('error')+': '+(d.errors&&d.errors[0]&&d.errors[0].message||''),'err');hideL()}}).catch(function(e){toast(t('error')+': '+e.message,'err');hideL()});
}
function togglePageRule(id,cur){
  if(!S.zone)return;showL();
  var ns=cur==='active'?'disabled':'active';
  fetch(PROXY+'/zones/'+S.zone.id+'/pagerules/'+id,{method:'PATCH',headers:hdrs(),body:JSON.stringify({status:ns})})
  .then(function(r){return r.json()}).then(function(d){if(d.success)loadPageRules();else{toast(t('error'),'err');hideL()}}).catch(function(e){toast(t('error')+': '+e.message,'err');hideL()});
}
function deletePageRule(id){
  if(!S.zone||!confirm(t('deleteConfirm')))return;showL();
  fetch(PROXY+'/zones/'+S.zone.id+'/pagerules/'+id,{method:'DELETE',headers:hdrs()})
  .then(function(r){return r.json()}).then(function(d){if(d.success){toast(t('deleted'),'ok');loadPageRules()}else{toast(t('error'),'err');hideL()}}).catch(function(e){toast(t('error')+': '+e.message,'err');hideL()});
}

  h+='</div>';

  // Method 2: One-liner
  h+='<div style="background:var(--g50);border:1px solid var(--g200);border-radius:10px;padding:16px;margin-bottom:14px">';
  h+='<div style="font-weight:700;font-size:15px;margin-bottom:8px">⚡ '+(isFA?'روش ۲ — نصب مستقیم روی سرور':'Method 2 — Direct Install on Server')+'</div>';
  h+='<div style="font-size:13px;color:var(--g600);margin-bottom:10px">'+(isFA?'این دستور رو مستقیم تو ترمینال سرورتون اجرا کنید:':'Run this command directly on your server terminal:')+'</div>';
  h+='<div style="background:var(--g900);color:var(--cf-green);border-radius:8px;padding:12px;font-family:monospace;font-size:12px;direction:ltr;text-align:left;cursor:pointer;word-break:break-all" onclick="copyCmd(this.textContent)">curl -fsSL https://raw.githubusercontent.com/Schmi7zz/EazyFlare/main/install.sh | bash</div>';
  h+='<div style="font-size:12px;color:var(--g500);margin-top:8px">'+(isFA?'Docker یا Systemd رو انتخاب می‌کنید و توکن ربات رو وارد می‌کنید.':'Choose Docker or Systemd and enter your bot token.')+'</div>';
  h+='</div>';

  // Prerequisites
  h+='<div style="border:1px solid var(--g200);border-radius:10px;padding:16px">';
  h+='<div style="font-weight:700;font-size:14px;margin-bottom:10px">📋 '+(isFA?'پیش‌نیازها':'Prerequisites')+'</div>';
  var items=isFA?['سرور لینوکسی (Ubuntu/Debian)','دسترسی SSH یا ترمینال','توکن ربات تلگرام از @BotFather','(اختیاری) دامنه برای مینی‌اپ']:['Linux server (Ubuntu/Debian)','SSH or terminal access','Telegram bot token from @BotFather','(Optional) Domain for mini app'];
  items.forEach(function(item){
    h+='<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:var(--g600)"><span style="color:var(--cf-green)">✓</span> '+item+'</div>';
  });
  h+='</div>';

  h+='</div>';
  $('deployArea').innerHTML=h;
}
function copyCmd(txt){
  navigator.clipboard.writeText(txt).then(function(){toast('📋 Copied!','ok')}).catch(function(){});
}

function loadDNS(){if(!S.zone)return;showL();var all=[],p=1;function lp(){cf('/zones/'+S.zone.id+'/dns_records?per_page=100&page='+p).then(function(d){all=all.concat(d.result);var tp=(d.result_info&&d.result_info.total_pages)||1;if(p<tp){p++;lp()}else{S.dns=all;$('dnsCount').textContent=all.length;renderFilters();renderTable();hideL()}}).catch(function(e){toast(t('error')+': '+e.message,'err');hideL()})}lp()}
function renderFilters(){var tc={};S.dns.forEach(function(r){tc[r.type]=(tc[r.type]||0)+1});var h='<div class="f-pills"><button class="f-pill '+(S.filter===''?'active':'')+'" onclick="setF(\'\')">'+t('all')+' ('+S.dns.length+')</button>';Object.keys(tc).sort().forEach(function(tp){h+='<button class="f-pill '+(S.filter===tp?'active':'')+'" onclick="setF(\''+tp+'\')">'+tp+' ('+tc[tp]+')</button>'});h+='</div>';$('dnsFilters').innerHTML=h}
function setF(tp){S.filter=tp;renderFilters();renderTable()}

function renderTable(){
  var recs=S.filter?S.dns.filter(function(r){return r.type===S.filter}):S.dns;
  if(!recs.length){$('dnsArea').innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="6" rx="1"/><rect x="2" y="15" width="20" height="6" rx="1"/></svg><h3>'+t('noRecords')+'</h3><p>'+t('noRecordsDesc')+'</p><button class="btn btn-pri" onclick="openAddModal()">'+t('addRecord')+'</button></div>';return}
  var h='<table class="dns-table"><thead><tr><th>'+t('type')+'</th><th>'+t('name')+'</th><th>'+t('content')+'</th><th>'+t('proxy')+'</th><th>'+t('ttl')+'</th><th>'+t('actions')+'</th></tr></thead><tbody>';
  recs.forEach(function(r){var px=r.proxied?'<span class="px-icon on"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>'+t('on')+'</span>':'<span class="px-icon off"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>'+t('off')+'</span>';var ttl=r.ttl===1?t('auto'):(r.ttl>=3600?Math.floor(r.ttl/3600)+'h':r.ttl+'s');var nm=r.name.replace('.'+S.zone.name,'')||'@';var ct=r.content.length>45?r.content.substring(0,45)+'…':r.content;var canPx=['A','AAAA','CNAME'].indexOf(r.type)!==-1;
  h+='<tr><td><span class="tbadge '+r.type+'">'+r.type+'</span></td><td><span class="n-cell">'+nm+'</span></td><td><span class="c-cell" title="'+r.content+'">'+ct+'</span></td><td>'+(canPx?px:'—')+'</td><td><span class="t-cell">'+ttl+'</span></td><td><div class="a-cell"><button class="abtn" onclick="openEditMo(\''+r.id+'\')" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="abtn danger" onclick="confirmDel(\''+r.id+"','"+r.name.replace(/'/g,"\\'")+'\')" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div></td></tr>'});
  h+='</tbody></table>';$('dnsArea').innerHTML=h;
}

function openAddModal(){
  var phs={A:t('ipv4ph'),AAAA:t('ipv6ph'),CNAME:t('cnamePh'),MX:t('mxPh'),TXT:t('txtPh'),NS:t('nsPh'),SRV:t('srvPh'),CAA:t('caaPh')};
  openMo('<div class="mo-title"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--cf-blue-600)" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'+t('addRecord')+'</div><div class="fg"><label class="fl">'+t('recType')+'</label><select class="fs" id="aType" onchange="onATC()"><option value="A">A</option><option value="AAAA">AAAA</option><option value="CNAME">CNAME</option><option value="MX">MX</option><option value="TXT">TXT</option><option value="NS">NS</option><option value="SRV">SRV</option><option value="CAA">CAA</option></select></div><div class="fg"><label class="fl">'+t('recName')+'</label><input class="fi" id="aName" value="@" placeholder="@"/><div class="fh">'+t('rootHint')+' — .'+S.zone.name+'</div></div><div class="fg"><label class="fl">'+t('recContent')+'</label><input class="fi" id="aCont" placeholder="'+phs.A+'"/></div><div class="fg" id="aPriGrp" style="display:none"><label class="fl">'+t('priority')+'</label><input class="fi" id="aPri" type="number" value="10"/></div><div class="fg"><label class="fl">TTL</label><select class="fs" id="aTTL"><option value="1">'+t('auto')+'</option><option value="60">'+t('min1')+'</option><option value="300">'+t('min5')+'</option><option value="3600">'+t('hour1')+'</option><option value="86400">'+t('day1')+'</option></select></div><div class="fg" id="aPxGrp"><div class="ftg" onclick="tgl(\'aPx\')"><div class="tg-track on" id="aPxT"><div class="tg-knob"></div></div><span class="tg-label">'+t('proxyLabel')+'</span></div><input type="hidden" id="aPx" value="true"/></div><div class="btn-group mt-16"><button class="btn btn-pri" onclick="submitAdd()" style="flex:1">'+t('save')+'</button><button class="btn btn-out" onclick="closeMo()">'+t('cancel')+'</button></div>');
}
function onATC(){var tp=$('aType')?$('aType').value:'';if(!tp)return;var pg=$('aPriGrp'),pxg=$('aPxGrp'),ci=$('aCont');if(pg)pg.style.display=['MX','SRV'].indexOf(tp)!==-1?'block':'none';if(pxg)pxg.style.display=['A','AAAA','CNAME'].indexOf(tp)!==-1?'block':'none';var phs={A:t('ipv4ph'),AAAA:t('ipv6ph'),CNAME:t('cnamePh'),MX:t('mxPh'),TXT:t('txtPh'),NS:t('nsPh'),SRV:t('srvPh'),CAA:t('caaPh')};if(ci)ci.placeholder=phs[tp]||''}
function tgl(id){var i=$(id),tr=$(id+'T');var on=i.value==='true';i.value=on?'false':'true';tr.classList.toggle('on',!on)}
function submitAdd(){var type=$('aType').value;var name=$('aName').value.trim();var content=$('aCont').value.trim();var ttl=parseInt($('aTTL').value);var proxied=$('aPx')?$('aPx').value==='true':false;var priority=parseInt($('aPri')?$('aPri').value:'10')||10;if(!content){toast(t('errToken'),'err');return}if(name==='@')name=S.zone.name;else if(name.indexOf(S.zone.name)===-1)name=name+'.'+S.zone.name;var body={type:type,name:name,content:content,ttl:ttl};if(['A','AAAA','CNAME'].indexOf(type)!==-1)body.proxied=proxied;if(['MX','SRV'].indexOf(type)!==-1)body.priority=priority;closeMo();showL();cf('/zones/'+S.zone.id+'/dns_records',{method:'POST',body:JSON.stringify(body)}).then(function(){toast(t('created'),'ok');loadDNS()}).catch(function(e){toast(t('error')+': '+e.message,'err');hideL()})}

function openEditMo(id){var r=S.dns.find(function(x){return x.id===id});if(!r)return;var ip=['A','AAAA','CNAME'].indexOf(r.type)!==-1;var hp=['MX','SRV'].indexOf(r.type)!==-1;var h='<div class="mo-title"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--cf-blue-600)" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'+t('editRecord')+' '+r.type+'</div>';h+='<div class="fg"><label class="fl">'+t('type')+'</label><input class="fi" value="'+r.type+'" disabled/></div>';h+='<div class="fg"><label class="fl">'+t('name')+'</label><input class="fi" id="eName" value="'+r.name+'"/></div>';h+='<div class="fg"><label class="fl">'+t('content')+'</label><input class="fi" id="eCont" value="'+r.content+'"/></div>';if(hp)h+='<div class="fg"><label class="fl">'+t('priority')+'</label><input class="fi" id="ePri" type="number" value="'+(r.priority||10)+'"/></div>';h+='<div class="fg"><label class="fl">TTL</label><select class="fs" id="eTTL"><option value="1" '+(r.ttl===1?'selected':'')+'>'+t('auto')+'</option><option value="300" '+(r.ttl===300?'selected':'')+'>'+t('min5')+'</option><option value="3600" '+(r.ttl===3600?'selected':'')+'>'+t('hour1')+'</option><option value="86400" '+(r.ttl===86400?'selected':'')+'>'+t('day1')+'</option></select></div>';if(ip)h+='<div class="fg"><div class="ftg" onclick="tgl(\'ePx\')"><div class="tg-track '+(r.proxied?'on':'')+'" id="ePxT"><div class="tg-knob"></div></div><span class="tg-label">'+t('proxyLabel')+'</span></div><input type="hidden" id="ePx" value="'+r.proxied+'"/></div>';h+='<div class="btn-group mt-16"><button class="btn btn-pri" onclick="submitEdit(\''+id+"','"+r.type+'\')" style="flex:1">'+t('save')+'</button><button class="btn btn-out" onclick="closeMo()">'+t('cancel')+'</button></div>';openMo(h)}
function submitEdit(id,type){var name=$('eName').value.trim(),content=$('eCont').value.trim(),ttl=parseInt($('eTTL').value);var proxied=$('ePx')?$('ePx').value==='true':false;var priority=$('ePri')?parseInt($('ePri').value):undefined;if(!content){toast(t('errToken'),'err');return}var body={type:type,name:name,content:content,ttl:ttl};if(['A','AAAA','CNAME'].indexOf(type)!==-1)body.proxied=proxied;if(priority!==undefined)body.priority=priority;closeMo();showL();cf('/zones/'+S.zone.id+'/dns_records/'+id,{method:'PUT',body:JSON.stringify(body)}).then(function(){toast(t('updated'),'ok');loadDNS()}).catch(function(e){toast(t('error')+': '+e.message,'err');hideL()})}
function confirmDel(id,name){openMo('<div class="mo-title" style="color:var(--cf-red)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>'+t('deleteRecord')+'</div><p style="font-size:14px;color:var(--g600);margin-bottom:8px">'+t('deleteConfirm')+'</p><div style="background:var(--g50);border-radius:8px;padding:12px;margin-bottom:16px;direction:ltr;text-align:left;font-family:monospace;font-size:13px">'+name+'</div><p style="font-size:12px;color:var(--cf-red);margin-bottom:16px">⚠️ '+t('deleteWarn')+'</p><div class="btn-group"><button class="btn btn-dng" onclick="doDel(\''+id+'\')" style="flex:1">'+t('delete')+'</button><button class="btn btn-out" onclick="closeMo()">'+t('cancel')+'</button></div>')}
function doDel(id){closeMo();showL();cf('/zones/'+S.zone.id+'/dns_records/'+id,{method:'DELETE'}).then(function(){toast(t('deleted'),'ok');loadDNS()}).catch(function(e){toast(t('error')+': '+e.message,'err');hideL()})}
function refreshView(){if(S.tab==='dns')loadDNS();else if(S.zone)selectZone(S.zone)}

/* ══════ INIT ══════ */
try{if(window.Telegram&&window.Telegram.WebApp){var tg=window.Telegram.WebApp;tg.ready();tg.expand();tg.MainButton.hide()}}catch(e){}
setLang(L);
var saved=localStorage.getItem('cf_auth');
if(saved){try{var d=JSON.parse(saved);S.auth=d.auth;S.token=d.token;S.email=d.email;var vp=S.auth==='token'?'/user/tokens/verify':'/zones?per_page=1';cf(vp).then(function(){enterApp()}).catch(function(){S.token='';S.email='';localStorage.removeItem('cf_auth');$('loginScreen').style.display='flex';$('mainApp').style.display='none'})}catch(e){localStorage.removeItem('cf_auth')}}
</script>
</body>
